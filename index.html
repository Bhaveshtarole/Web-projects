<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="app-title">
                <i class="fas fa-tasks"></i>
                My Todo List
            </h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="todo-input-container">
            <input 
                type="text" 
                id="todo-input" 
                class="todo-input" 
                placeholder="Add a new task..."
                maxlength="100"
            >
            
            
            
            <button id="add-btn" class="add-btn">
                <i class="fas fa-plus"></i>
                Add
            </button>
        </div>

        <div class="todo-stats">
            <span id="total-tasks">Total: 0</span>
            <span id="completed-tasks">Completed: 0</span>
            <span id="pending-tasks">Pending: 0</span>
        </div>

        <div class="todo-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todo-list" class="todo-list">
            <!-- Todo items will be dynamically added here -->
        </ul>

        <div class="todo-actions">
            <button id="clear-completed" class="action-btn">
                <i class="fas fa-trash"></i>
                Clear Completed
            </button>
            <button id="clear-all" class="action-btn">
                <i class="fas fa-trash-alt"></i>
                Clear All
            </button>
        </div>

        <div class="empty-state" id="empty-state">
            <i class="fas fa-clipboard-list"></i>
            <p>No tasks yet. Add one above!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
